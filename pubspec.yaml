name: patroller
description: Patroller - Flutter desktop visual runner for Flutter Patrol tests (macOS & Windows).
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  file_picker: ^8.1.7
  path: ^1.9.1
  path_provider: ^2.1.5
  uuid: ^4.5.1
  collection: ^1.19.1
  equatable: ^2.0.7
  google_fonts: ^6.2.1
  http: ^1.2.2
  archive: ^4.0.7
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  shelf_static: ^1.1.3
  web_socket_channel: ^3.0.0
  shelf_web_socket: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/patroller-app-icon.jpg